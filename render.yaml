services:
  - type: web
    name: kuryos-backend
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python start_server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: kuryos_crm
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://kuryos-deploy.vercel.app
      - key: CORS_ORIGINS
        value: https://kuryos-deploy.vercel.app
